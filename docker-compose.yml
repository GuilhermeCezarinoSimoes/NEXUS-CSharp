version: '3.9'

services:
  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexus-sqlserver
    environment:
      SA_PASSWORD: "NexusStrongPass@2025"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nexus-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (usuario: guest / senha: guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── TelemetryAPI ─────────────────────────────────────────────────────────────
  telemetryapi:
    build:
      context: .
      dockerfile: src/TelemetryAPI/Dockerfile
    container_name: nexus-telemetry
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NEXUS_Telemetry;User Id=sa;Password=NexusStrongPass@2025;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq

  # ── AlertsAPI ────────────────────────────────────────────────────────────────
  alertsapi:
    build:
      context: .
      dockerfile: src/AlertsAPI/Dockerfile
    container_name: nexus-alerts
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NEXUS_Alerts;User Id=sa;Password=NexusStrongPass@2025;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq

volumes:
  sqlserver_data:
  rabbitmq_data:
